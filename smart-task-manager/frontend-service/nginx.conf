# nginx.conf — Nginx web server configuration for the frontend service
#
# Purpose:
# 1. Serve static files (HTML, CSS, JS) from /usr/share/nginx/html
# 2. Proxy API requests (/api/*) to the backend service container
#
# This is a key microservices pattern: the frontend never talks directly
# to the backend by its Docker hostname — nginx handles routing.

events {
    worker_connections 1024;
}

http {
    # Include MIME type mappings (maps file extensions → Content-Type headers)
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Enable efficient file transfer
    sendfile on;

    # Keep connections alive for 65 seconds
    keepalive_timeout 65;

    # Compress responses to save bandwidth
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;

    server {
        listen 80;
        server_name localhost;

        # Root directory for static files
        root /usr/share/nginx/html;
        index index.html;

        # ---- Serve Frontend Static Files ----
        location / {
            # Try to serve the file directly; fall back to index.html (SPA support)
            try_files $uri $uri/ /index.html;
        }

        # ---- Proxy API requests to backend container ----
        # Any request to /api/* is forwarded to the backend service
        # Docker Compose networking resolves 'backend' to the backend container's IP
        location /api/ {
            proxy_pass         http://backend:8080/api/;
            proxy_http_version 1.1;

            # Pass important headers to the backend
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # Timeouts
            proxy_connect_timeout 10s;
            proxy_read_timeout    30s;
        }

        # ---- Cache static assets ----
        location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # ---- Error pages ----
        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
        }
    }
}
