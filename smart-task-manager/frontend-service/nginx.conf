# nginx.conf — Nginx web server configuration for the frontend service
#
# Purpose:
# 1. Serve static files (HTML, CSS, JS) from /usr/share/nginx/html
# 2. Proxy API requests (/api/*) to the backend service container
#
# This is a key microservices pattern: the frontend never talks directly
# to the backend by its Docker hostname — nginx handles routing.

events {
    worker_connections 1024;
}

http {
    # Include MIME type mappings (maps file extensions → Content-Type headers)
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Enable efficient file transfer
    sendfile on;

    # Keep connections alive for 65 seconds
    keepalive_timeout 65;

    # Compress responses to save bandwidth
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;

    server {
        listen 80;
        server_name localhost;

        # Root directory for static files
        root /usr/share/nginx/html;
        index index.html;

        # ---- Serve Frontend Static Files ----
        location / {
            # Try to serve the file directly; fall back to index.html (SPA support)
            try_files $uri $uri/ /index.html;
        }

        # ---- Proxy all traffic to Express API Gateway (BFF) ----
        # The gateway handles: JWT proxy to Spring Boot, Socket.io,
        # AI scoring (/ai/*), XP gamification (/xp/*)
        location /api/ {
            proxy_pass         http://api-gateway:3001/api/;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_connect_timeout 10s;
            proxy_read_timeout    30s;
        }

        # ---- AI scoring endpoint ----
        location /ai/ {
            proxy_pass         http://api-gateway:3001/ai/;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
        }

        # ---- XP / Gamification endpoint ----
        location /xp/ {
            proxy_pass         http://api-gateway:3001/xp/;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
        }

        # ---- Socket.io (WebSocket) ----
        location /socket.io/ {
            proxy_pass         http://api-gateway:3001/socket.io/;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host       $host;
            proxy_read_timeout 86400s;
        }

        # ---- Cache static assets ----
        location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # ---- Error pages ----
        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
        }
    }
}
