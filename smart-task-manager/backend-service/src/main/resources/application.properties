# =============================================================
# Smart Task Manager - Backend Service Configuration
# =============================================================

# ---- Server ----
server.port=8080

# ---- MySQL DataSource ----
# Host 'db' resolves to the MySQL container via Docker network
spring.datasource.url=jdbc:mysql://db:3306/smarttaskdb?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root123}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ---- JPA / Hibernate ----
# update: auto-creates/alters tables on startup
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# ---- Redis ----
# Host 'redis' resolves to the Redis container via Docker network
spring.data.redis.host=${REDIS_HOST:redis}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.timeout=2000ms

# ---- JWT Configuration ----
# Secret must be at least 256 bits (32 chars); override via environment variable in production
app.jwt.secret=${JWT_SECRET:ThisIsASecretKeyThatMustBeAtLeast256BitsLong!}
# Token validity: 24 hours
app.jwt.expiration-ms=86400000

# ---- Logging ----
logging.level.com.smarttask=INFO
logging.level.org.springframework.security=WARN

# ---- Actuator (health check endpoint for Docker & Jenkins) ----
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never
